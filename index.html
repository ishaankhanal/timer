<!DOCTYPE html>

<html>
<head>
    <title>Timer System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>A Cool Timer!</h1>
    <hr>
    <div class="timer">
        <p id="counter">0</p>
    </div>
    <br>
    <label>Set Timer:</label>
    <input type="number" id="stopwatchStart" placeholder="60">
    <button id="ConfirmStopWatchStart">Confirm</button>
    <br><br>
    <button id="start">Begin Timer</button>
    <script src="index.js"></script>
</body>
</html>
